<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <style>
    .bg { fill: #ffffff; }
    .bar { fill: #4a90e2; }
    .bar-hover { fill: #7ab3ef; }
    .axis { stroke: #333333; stroke-width: 1; }
    .label { fill: #333333; font-family: sans-serif; font-size: 12px; }
    .title { fill: #333333; font-family: sans-serif; font-size: 14px; font-weight: bold; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1e1e1e; }
      .bar { fill: #6ba4e8; }
      .axis { stroke: #e0e0e0; }
      .label { fill: #e0e0e0; }
      .title { fill: #e0e0e0; }
    }
  </style>
  <rect class="bg" width="400" height="260"/>
  <text class="title" x="200" y="22" text-anchor="middle">Quarterly Sales</text>
  <line class="axis" x1="50" y1="220" x2="380" y2="220"/>
  <line class="axis" x1="50" y1="50" x2="50" y2="220"/>
  <rect class="bar" x="80" y="130" width="50" height="90"/>
  <rect class="bar" x="160" y="90" width="50" height="130"/>
  <rect class="bar" x="240" y="60" width="50" height="160"/>
  <rect class="bar" x="320" y="110" width="50" height="110"/>
  <text class="label" x="105" y="240" text-anchor="middle">Q1</text>
  <text class="label" x="185" y="240" text-anchor="middle">Q2</text>
  <text class="label" x="265" y="240" text-anchor="middle">Q3</text>
  <text class="label" x="345" y="240" text-anchor="middle">Q4</text>
  <text class="label" x="105" y="125" text-anchor="middle">45</text>
  <text class="label" x="185" y="85" text-anchor="middle">65</text>
  <text class="label" x="265" y="55" text-anchor="middle">80</text>
  <text class="label" x="345" y="105" text-anchor="middle">55</text>
</svg>
